<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin - Projetos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="mb-4">Gerenciar Projetos</h1>

    <!-- Tabela de Projetos -->
    <table class="table table-bordered bg-white">
        <thead class="table-light">
        <tr>
            <th>#</th>
            <th>Título</th>
            <th>Descrição</th>
            <th>GitHub</th>
            <th>Deploy</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody id="tabela-projetos"></tbody>
    </table>

    <!-- Formulário -->
    <h3 class="mt-5">Adicionar / Editar Projeto</h3>
    <form id="form-projeto" class="bg-white p-4 border rounded">
        <input type="hidden" id="idProjeto">
        <div class="mb-3">
            <label for="titulo" class="form-label">Título</label>
            <input type="text" class="form-control" id="titulo" required>
        </div>
        <div class="mb-3">
            <label for="descricao" class="form-label">Descrição</label>
            <textarea class="form-control" id="descricao" required></textarea>
        </div>
        <div class="mb-3">
            <label for="linkGitHub" class="form-label">Link GitHub</label>
            <input type="url" class="form-control" id="linkGitHub">
        </div>
        <div class="mb-3">
            <label for="linkDeploy" class="form-label">Link Deploy</label>
            <input type="url" class="form-control" id="linkDeploy">
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <button type="button" class="btn btn-secondary" onclick="cancelarEdicao()">Cancelar</button>
    </form>

    <div class="mt-3" id="msg-status"></div>
</div>

<script src="../js/admin-projetos.js"></script>
</body>
</html>
